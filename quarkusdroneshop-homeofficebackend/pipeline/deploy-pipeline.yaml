apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-quarkusdroneshop-homeofficebackend
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-homeofficebackend
    app.kubernetes.io/instance: quarkusdroneshop-homeofficebackend
    app.kubernetes.io/part-of: quarkusdroneshop
    tekton.dev/pipeline: build-and-push-quarkusdroneshop-homeofficebackend
    backstage.io/kubernetes-id: quarkusdroneshop-homeofficebackend
spec:
  params:
    - default: latest
      description: Image Tag Value
      name: IMAGE_TAG
      type: string
  results:
    - name: report-url
      description: Test report URL
      value: $(tasks.pipeline-summary.results.report-url)
  workspaces:
    - name: shared-workspace
    - name: maven-cache
  tasks:

    - name: fetch-repository
      params:
        - name: url
          value: 'https://github.com/quarkusdroneshop/quarkusdroneshop-homeoffice'
        - name: subdirectory
          value: ''
        - name: deleteExisting
          value: 'true'
      taskRef:
        kind: Task
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: semgrep-scan
      runAfter:
        - pmd-run
      taskRef:
        kind: Task
        name: semgrep-scan
      params:
        - name: RULES
          value: "p/java,p/owasp-top-ten,p/secrets"
        - name: FAIL_ON_FINDINGS
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: gitleaks-scan
      onError: continue
      runAfter:
        - semgrep-scan
      taskRef:
        kind: Task
        name: gitleaks-scan
      params:
        - name: REPORT_FORMAT
          value: "json"
        - name: REPORT_PATH
          value: "target/gitleaks-report.json"
        - name: EXIT_CODE
          value: "0"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: trivy-scan
      onError: continue
      runAfter:
        - gitleaks-scan
      taskRef:
        kind: Task
        name: trivy-scan
      params:
        - name: SCANNERS
          value: "vuln,secret"
        - name: EXIT_CODE
          value: "0"
        - name: OUTPUT_FILE
          value: "target/trivy.txt"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: checkstyle-run
      onError: continue
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "checkstyle:check -Dcheckstyle.failsOnError=false"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: maven-cache

    - name: pmd-run
      onError: continue
      runAfter:
        - checkstyle-run
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "pmd:pmd -Dpmd.failOnViolation=false"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: maven-cache

    - name: maven-unit-test
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "clean verify -DskipITs -Dtest=!ArchitectureTest"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: maven-cache

    - name: maven-arch-test
      onError: continue
      runAfter:
        - maven-unit-test
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "failsafe:integration-test failsafe:verify -Dit.test=ArchitectureTest -Dsurefire.skip=true"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: maven-cache

    - name: spotbugs-run
      onError: continue
      runAfter:
        - trivy-scan
        - maven-arch-test
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "spotbugs:spotbugs"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: maven-cache

    - name: maven-e2e-test
      onError: continue
      runAfter:
        - maven-arch-test
      taskRef:
        kind: Task
        name: maven-playwright
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "test-compile failsafe:integration-test failsafe:verify -Dsurefire.skip=true"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: maven-cache

    - name: wapiti-scan
      onError: continue
      runAfter:
        - push-oc-apps
      taskRef:
        kind: Task
        name: wapiti-scan
      params:
        - name: APP_NAME
          value: "homeoffice-backend"
        - name: NAMESPACE
          value: "quarkusdroneshop-demo"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: generate-report
      onError: continue
      runAfter:
        - wapiti-scan
        - spotbugs-run
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "exec:exec@generate-report"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: maven-cache
          workspace: maven-cache

    - name: print-csv-table
      onError: continue
      runAfter:
        - generate-report
      taskRef:
        kind: Task
        name: print-csv-table
      params:
        - name: TITLE
          value: "homeoffice-backend テスト結果サマリー"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: publish-test-report
      runAfter:
        - print-csv-table
      taskRef:
        kind: Task
        name: publish-test-report
      params:
        - name: APP_NAME
          value: homeoffice-backend
        - name: CONTEXT_DIR
          value: .
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: pipeline-summary
      runAfter:
        - publish-test-report
      taskRef:
        kind: Task
        name: pipeline-summary
      params:
        - name: APP_NAME
          value: homeoffice-backend
        - name: TEST_TOTAL
          value: $(tasks.print-csv-table.results.total-tests)
        - name: TEST_PASSED
          value: $(tasks.print-csv-table.results.passed)
        - name: TEST_FAILURES
          value: $(tasks.print-csv-table.results.failures)
        - name: TEST_ERRORS
          value: $(tasks.print-csv-table.results.errors)
        - name: SEMGREP_HIGH
          value: $(tasks.semgrep-scan.results.high)
        - name: SEMGREP_MEDIUM
          value: $(tasks.semgrep-scan.results.medium)
        - name: SEMGREP_LOW
          value: $(tasks.semgrep-scan.results.low)
        - name: SEMGREP_TOTAL
          value: $(tasks.semgrep-scan.results.total)
        - name: REPORT_URL
          value: $(tasks.publish-test-report.results.report-url)

    - name: push-oc-apps
      runAfter:
        - maven-e2e-test
      taskRef:
        name: push-app-task
      params:
        - name: SCRIPT
          value: |
            #!/bin/bash
            set -e

            oc delete route homeoffice-backend -n quarkusdroneshop-demo --ignore-not-found=true
            oc delete svc homeoffice-backend -n quarkusdroneshop-demo --ignore-not-found=true
            oc delete deployment homeoffice-backend -n quarkusdroneshop-demo --ignore-not-found=true
            oc delete is homeoffice-backend -n quarkusdroneshop-demo --ignore-not-found=true
            oc delete bc/homeoffice-backend -n quarkusdroneshop-demo --ignore-not-found=true
            oc delete istag homeoffice-backend:latest -n quarkusdroneshop-demo --ignore-not-found=true

            # ── DB シークレット確認 ──────────────────────────────────────────
            if ! oc get secret droneshopdb-pguser-droneshopadmin -n quarkusdroneshop-demo &>/dev/null; then
              echo "ERROR: secret droneshopdb-pguser-droneshopadmin not found. CrunchyData PostgreSQL cluster is not ready." >&2
              exit 1
            fi

            # ── ConfigMap / Secret から値を先読み ────────────────────────────
            POSTGRESQL_JDBC_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.PGSQL_URL}')
            POSTGRESQL_USER=$(oc get secret droneshopdb-pguser-droneshopadmin -n quarkusdroneshop-demo -o=jsonpath='{.data.user}' | base64 --decode)
            POSTGRESQL_PASSWORD=$(oc get secret droneshopdb-pguser-droneshopadmin -n quarkusdroneshop-demo -o=jsonpath='{.data.password}' | base64 --decode)
            KAFKA_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}')
            QUARKUS_LOG_LEVEL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.QUARKUS_LOG_LEVEL}')
            QUARKUSDRONESHOP_LOG_LEVEL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.QUARKUSDRONESHOP_LOG_LEVEL}')
            STORE_LOCATIONS=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.STORE_ID}')

            # ── シーケンスリセット（デプロイ前に実行・既存データと整合性を確保）───
            PGPOD=$(oc get pod -n quarkusdroneshop-demo \
              -l postgres-operator.crunchydata.com/role=master \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || \
              oc get pod -n quarkusdroneshop-demo \
              -l postgres-operator.crunchydata.com/role=primary \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

            if [[ -n "$PGPOD" ]]; then
              echo "Resetting sequences on pod: $PGPOD"
              oc exec "$PGPOD" -n quarkusdroneshop-demo -- \
                psql -U droneshopadmin -d droneshopdb -c "
SELECT setval('droneshop.id_seq_gen', (
  SELECT GREATEST(
    COALESCE((SELECT MAX(id) FROM droneshop.\"lineItems\"), 0),
    COALESCE((SELECT MAX(id) FROM droneshop.productitemsales), 0),
    COALESCE((SELECT MAX(id) FROM droneshop.itemsales), 0),
    COALESCE((SELECT MAX(id) FROM droneshop.productsales), 0),
    COALESCE((SELECT MAX(id) FROM droneshop.averageorderuptime), 0),
    COALESCE((SELECT MAX(id) FROM droneshop.storeserversales), 0),
    COALESCE((SELECT MAX(id) FROM droneshop.storelocation), 0)
  ) + 100
));
" || echo "WARNING: sequence reset had warnings (non-fatal)"
            else
              echo "WARNING: PostgreSQL primary pod not found; skipping sequence reset"
            fi

            oc new-build --binary --name=homeoffice-backend --image=registry.access.redhat.com/ubi8/openjdk-21:1.20 -n quarkusdroneshop-demo
            oc patch bc/homeoffice-backend -n quarkusdroneshop-demo --type=json -p '[{"op":"replace","path":"/spec/strategy/sourceStrategy/from","value":{"kind":"DockerImage","name":"registry.access.redhat.com/ubi8/openjdk-21:1.20"}}]'
            oc start-build homeoffice-backend --from-dir=target/quarkus-app/ --follow -n quarkusdroneshop-demo
            oc new-app homeoffice-backend --name=homeoffice-backend --allow-missing-images -n quarkusdroneshop-demo

            oc expose deployment homeoffice-backend --port=8080 --name=homeoffice-backend -n quarkusdroneshop-demo || true
            oc expose svc homeoffice-backend --name=homeoffice-backend -n quarkusdroneshop-demo || true
            oc patch route homeoffice-backend -n quarkusdroneshop-demo \
              --type=merge \
              -p '{"spec":{"tls":{"termination":"edge","insecureEdgeTerminationPolicy":"Redirect"}}}' || true

            # ── すべての env を 1 コマンドでセット（余分なロールアウトを防ぐ）──
            # QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION=none で再デプロイ時のシーケンスリセットを防止
            oc set env deployment/homeoffice-backend \
              JAVA_OPTS_APPEND="-Dquarkus.profile=prod" \
              POSTGRESQL_JDBC_URL="$POSTGRESQL_JDBC_URL" \
              POSTGRESQL_USER="$POSTGRESQL_USER" \
              POSTGRESQL_PASSWORD="$POSTGRESQL_PASSWORD" \
              KAFKA_BOOTSTRAP_URLS="$KAFKA_URL" \
              QUARKUS_LOG_LEVEL="$QUARKUS_LOG_LEVEL" \
              QUARKUSDRONESHOP_LOG_LEVEL="$QUARKUSDRONESHOP_LOG_LEVEL" \
              STORE_LOCATIONS="$STORE_LOCATIONS" \
              QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION="none" \
              -n quarkusdroneshop-demo

            CONFIG_CORS_ORIGINS=$(oc get route homeoffice-backend -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)
            CONFIG_LOYALTY_STREAM_URL="${CONFIG_CORS_ORIGINS}/dashboard/loyaltystream"
            CONFIG_STREAM_URL="${CONFIG_CORS_ORIGINS}/dashboard/stream"
            CONFIG_GRAPHQL_URL="${CONFIG_CORS_ORIGINS}/graphql"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"CORS_ORIGINS\":\"http://$CONFIG_CORS_ORIGINS\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"LOYALTY_STREAM_URL\":\"http://$CONFIG_LOYALTY_STREAM_URL\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"STREAM_URL\":\"http://$CONFIG_STREAM_URL\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"GRAPHQL_URL\":\"http://$CONFIG_GRAPHQL_URL\"}}"

            # ── アプリ起動待ち（シーケンスリセット前にスキーマ更新完了を待つ）──
            echo "Waiting for homeoffice-backend rollout..."
            oc rollout status deployment/homeoffice-backend -n quarkusdroneshop-demo --timeout=300s

            # ── PostgreSQL シーケンスリセット（Hibernate sequence と DB の不整合修正）──
            PGPOD=$(oc get pod -n quarkusdroneshop-demo \
              -l postgres-operator.crunchydata.com/role=master \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || \
              oc get pod -n quarkusdroneshop-demo \
              -l postgres-operator.crunchydata.com/role=primary \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

            if [[ -n "$PGPOD" ]]; then
              echo "Resetting sequences on pod: $PGPOD"
              oc exec "$PGPOD" -n quarkusdroneshop-demo -- psql -U droneshopadmin -d droneshopdb -c "
                DO \$\$
                DECLARE
                  seq_rec RECORD;
                BEGIN
                  FOR seq_rec IN
                    SELECT
                      s.relname AS seq_name,
                      t.relname AS tbl_name,
                      a.attname AS col_name
                    FROM pg_class s
                    JOIN pg_depend d ON d.objid = s.oid
                    JOIN pg_class t ON t.oid = d.refobjid
                    JOIN pg_attribute a ON a.attrelid = t.oid AND a.attnum = d.refobjsubid
                    JOIN pg_namespace n ON n.oid = s.relnamespace
                    WHERE s.relkind = 'S'
                      AND n.nspname = 'droneshop'
                  LOOP
                    EXECUTE format(
                      'SELECT setval(%L, COALESCE((SELECT MAX(%I) FROM droneshop.%I), 1))',
                      'droneshop.' || seq_rec.seq_name,
                      seq_rec.col_name,
                      seq_rec.tbl_name
                    );
                    RAISE NOTICE 'Reset sequence: %', seq_rec.seq_name;
                  END LOOP;
                END
                \$\$;
              " || echo "WARNING: sequence reset failed (non-fatal)"
            else
              echo "WARNING: PostgreSQL primary pod not found; skipping sequence reset"
            fi
      workspaces:
        - name: source
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: build-and-push-quarkusdroneshop-homeofficebackend
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-homeofficebackend
    app.kubernetes.io/instance: quarkusdroneshop-homeofficebackend
    app.kubernetes.io/part-of: quarkusdroneshop
    tekton.dev/pipeline: build-and-push-quarkusdroneshop-homeofficebackend
    backstage.io/kubernetes-id: quarkusdroneshop-homeofficebackend
spec:
  pipelineRef:
    name: build-and-push-quarkusdroneshop-homeofficebackend
  params:
    - name: IMAGE_TAG
      value: latest
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: quarkusdroneshop-homeofficebackend-shared-workspace-pvc
    - name: maven-cache
      persistentVolumeClaim:
        claimName: maven-cache-pvc

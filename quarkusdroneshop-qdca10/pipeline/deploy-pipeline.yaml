apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-quarkusdroneshop-qdca10
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-qdca10
    app.kubernetes.io/instance: quarkusdroneshop-qdca10
    app.kubernetes.io/part-of: quarkusdroneshop
    backstage.io/kubernetes-id: quarkusdroneshop-qdca10
spec:
  params:
    - default: latest
      description: Image Tag Value
      name: IMAGE_TAG
      type: string
  results:
    - name: junit
      description: JUnit test result summary
      value: $(tasks.pipeline-summary.results.junit)
    - name: semgrep
      description: Semgrep SAST result summary
      value: $(tasks.pipeline-summary.results.semgrep)
    - name: report-url
      description: Test report URL
      value: $(tasks.pipeline-summary.results.report-url)
  workspaces:
    - name: shared-workspace
  tasks:

    - name: fetch-repository
      params:
        - name: url
          value: 'https://github.com/quarkusdroneshop/quarkusdroneshop-qdca10'
        - name: subdirectory
          value: ''
        - name: deleteExisting
          value: 'true'
      taskRef:
        kind: Task
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: semgrep-scan
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: semgrep-scan
      params:
        - name: RULES
          value: "p/java,p/owasp-top-ten,p/secrets"
        - name: FAIL_ON_FINDINGS
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: maven-unit-test
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "clean test"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: maven-e2e-test
      onError: continue
      runAfter:
        - maven-unit-test
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "verify -DskipTests"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: generate-report
      onError: continue
      runAfter:
        - maven-e2e-test
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "exec:exec@generate-report"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: print-csv-table
      onError: continue
      runAfter:
        - generate-report
      taskRef:
        kind: Task
        name: print-csv-table
      params:
        - name: TITLE
          value: "qdca10 テスト結果サマリー"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: publish-test-report
      runAfter:
        - print-csv-table
      taskRef:
        kind: Task
        name: publish-test-report
      params:
        - name: APP_NAME
          value: qdca10
        - name: CONTEXT_DIR
          value: .
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: pipeline-summary
      runAfter:
        - publish-test-report
      taskRef:
        kind: Task
        name: pipeline-summary
      params:
        - name: APP_NAME
          value: qdca10
        - name: TEST_TOTAL
          value: $(tasks.print-csv-table.results.total-tests)
        - name: TEST_PASSED
          value: $(tasks.print-csv-table.results.passed)
        - name: TEST_FAILURES
          value: $(tasks.print-csv-table.results.failures)
        - name: TEST_ERRORS
          value: $(tasks.print-csv-table.results.errors)
        - name: SEMGREP_HIGH
          value: $(tasks.semgrep-scan.results.high)
        - name: SEMGREP_MEDIUM
          value: $(tasks.semgrep-scan.results.medium)
        - name: SEMGREP_LOW
          value: $(tasks.semgrep-scan.results.low)
        - name: SEMGREP_TOTAL
          value: $(tasks.semgrep-scan.results.total)
        - name: REPORT_URL
          value: $(tasks.publish-test-report.results.report-url)

    - name: push-oc-apps
      runAfter:
        - print-csv-table
      taskRef:
        name: push-app-task
      params:
        - name: SCRIPT
          value: |
            #!/bin/bash
            set -e

            oc delete all -l app=qdca10 -n quarkusdroneshop-demo || true
            oc delete bc/qdca10 -n quarkusdroneshop-demo || true
            oc new-build --binary --name=qdca10 --docker-image=registry.access.redhat.com/ubi8/openjdk-21:1.20 -n quarkusdroneshop-demo
            oc patch bc/qdca10 -n quarkusdroneshop-demo --type=json -p '[{"op":"replace","path":"/spec/strategy/sourceStrategy/from","value":{"kind":"DockerImage","name":"registry.access.redhat.com/ubi8/openjdk-21:1.20"}}]'
            oc start-build qdca10 --from-dir=target/quarkus-app/ --follow -n quarkusdroneshop-demo
            oc new-app qdca10 --name=qdca10 --allow-missing-images -n quarkusdroneshop-demo
            oc set env deployment/quarkusdroneshop-qdca10 JAVA_OPTS_APPEND="-Dquarkus.profile=prod" -n quarkusdroneshop-demo

            KAFKA_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}')
            oc set env deployment/quarkusdroneshop-qdca10 KAFKA_BOOTSTRAP_URLS=$KAFKA_URL -n quarkusdroneshop-demo
            QUARKUS_LOG_LEVEL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.QUARKUS_LOG_LEVEL}')
            oc set env deployment/quarkusdroneshop-qdca10 QUARKUS_LOG_LEVEL=$QUARKUS_LOG_LEVEL -n quarkusdroneshop-demo
            QUARKUSDRONESHOP_LOG_LEVEL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.QUARKUSDRONESHOP_LOG_LEVEL}')
            oc set env deployment/quarkusdroneshop-qdca10 QUARKUSDRONESHOP_LOG_LEVEL=$QUARKUSDRONESHOP_LOG_LEVEL -n quarkusdroneshop-demo
      workspaces:
        - name: source
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: build-and-push-quarkusdroneshop-qdca10
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-qdca10
    app.kubernetes.io/instance: quarkusdroneshop-qdca10
    app.kubernetes.io/part-of: quarkusdroneshop
    backstage.io/kubernetes-id: quarkusdroneshop-qdca10
spec:
  pipelineRef:
    name: build-and-push-quarkusdroneshop-qdca10
  params:
    - name: IMAGE_TAG
      value: latest
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: quarkusdroneshop-qdca10-shared-workspace-pvc

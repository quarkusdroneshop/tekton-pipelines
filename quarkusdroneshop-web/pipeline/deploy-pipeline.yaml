apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-quarkusdroneshop-web
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-web
    app.kubernetes.io/instance: quarkusdroneshop-web
    app.kubernetes.io/part-of: quarkusdroneshop
    backstage.io/kubernetes-id: quarkusdroneshop-web
spec:
  params:
    - default: latest
      description: Image Tag Value
      name: IMAGE_TAG
      type: string
  results:
    - name: junit
      description: JUnit test result summary
      value: $(tasks.pipeline-summary.results.junit)
    - name: semgrep
      description: Semgrep SAST result summary
      value: $(tasks.pipeline-summary.results.semgrep)
    - name: report-url
      description: Test report URL
      value: $(tasks.pipeline-summary.results.report-url)
  workspaces:
    - name: shared-workspace
  tasks:

    - name: fetch-repository
      params:
        - name: url
          value: 'https://github.com/quarkusdroneshop/quarkusdroneshop-web'
        - name: subdirectory
          value: ''
        - name: deleteExisting
          value: 'true'
      taskRef:
        kind: Task
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: semgrep-scan
      runAfter:
        - pmd-run
      taskRef:
        kind: Task
        name: semgrep-scan
      params:
        - name: RULES
          value: "p/java,p/owasp-top-ten,p/secrets"
        - name: FAIL_ON_FINDINGS
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: gitleaks-scan
      onError: continue
      runAfter:
        - semgrep-scan
      taskRef:
        kind: Task
        name: gitleaks-scan
      params:
        - name: REPORT_FORMAT
          value: "json"
        - name: REPORT_PATH
          value: "target/gitleaks-report.json"
        - name: EXIT_CODE
          value: "0"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: trivy-scan
      onError: continue
      runAfter:
        - gitleaks-scan
      taskRef:
        kind: Task
        name: trivy-scan
      params:
        - name: SCANNERS
          value: "vuln,secret"
        - name: EXIT_CODE
          value: "0"
        - name: OUTPUT_FILE
          value: "target/trivy.txt"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: checkstyle-run
      onError: continue
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "checkstyle:check -Dcheckstyle.failsOnError=false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: pmd-run
      onError: continue
      runAfter:
        - checkstyle-run
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "pmd:pmd -Dpmd.failOnViolation=false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: maven-unit-test
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "clean test"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: spotbugs-run
      onError: continue
      runAfter:
        - trivy-scan
        - maven-unit-test
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "spotbugs:spotbugs"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: maven-e2e-test
      onError: continue
      runAfter:
        - maven-unit-test
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "test-compile failsafe:integration-test failsafe:verify"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: wapiti-scan
      onError: continue
      runAfter:
        - push-oc-apps
      taskRef:
        kind: Task
        name: wapiti-scan
      params:
        - name: APP_NAME
          value: "web"
        - name: NAMESPACE
          value: "quarkusdroneshop-demo"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: generate-report
      onError: continue
      runAfter:
        - wapiti-scan
        - spotbugs-run
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "exec:exec@generate-report"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: print-csv-table
      onError: continue
      runAfter:
        - generate-report
      taskRef:
        kind: Task
        name: print-csv-table
      params:
        - name: TITLE
          value: "web テスト結果サマリー"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: publish-test-report
      runAfter:
        - print-csv-table
      taskRef:
        kind: Task
        name: publish-test-report
      params:
        - name: APP_NAME
          value: web
        - name: CONTEXT_DIR
          value: .
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: pipeline-summary
      runAfter:
        - publish-test-report
      taskRef:
        kind: Task
        name: pipeline-summary
      params:
        - name: APP_NAME
          value: web
        - name: TEST_TOTAL
          value: $(tasks.print-csv-table.results.total-tests)
        - name: TEST_PASSED
          value: $(tasks.print-csv-table.results.passed)
        - name: TEST_FAILURES
          value: $(tasks.print-csv-table.results.failures)
        - name: TEST_ERRORS
          value: $(tasks.print-csv-table.results.errors)
        - name: SEMGREP_HIGH
          value: $(tasks.semgrep-scan.results.high)
        - name: SEMGREP_MEDIUM
          value: $(tasks.semgrep-scan.results.medium)
        - name: SEMGREP_LOW
          value: $(tasks.semgrep-scan.results.low)
        - name: SEMGREP_TOTAL
          value: $(tasks.semgrep-scan.results.total)
        - name: REPORT_URL
          value: $(tasks.publish-test-report.results.report-url)

    - name: push-oc-apps
      runAfter:
        - maven-e2e-test
      taskRef:
        name: push-app-task
      params:
        - name: SCRIPT
          value: |
            #!/bin/bash
            set -e

            oc delete all -l app=web -n quarkusdroneshop-demo || true
            oc delete bc/web -n quarkusdroneshop-demo || true
            oc new-build --binary --name=web --docker-image=registry.access.redhat.com/ubi8/openjdk-21:1.20 -n quarkusdroneshop-demo
            oc patch bc/web -n quarkusdroneshop-demo --type=json -p '[{"op":"replace","path":"/spec/strategy/sourceStrategy/from","value":{"kind":"DockerImage","name":"registry.access.redhat.com/ubi8/openjdk-21:1.20"}}]'
            oc start-build web --from-dir=target/quarkus-app/ --follow -n quarkusdroneshop-demo
            oc new-app web --name=web --allow-missing-images -n quarkusdroneshop-demo
            oc set env deployment/web JAVA_OPTS_APPEND="-Dquarkus.profile=prod" -n quarkusdroneshop-demo
            oc expose svc/web -n quarkusdroneshop-demo || true

            CONFIG_CORS_ORIGINS=$(oc get route web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)
            CONFIG_LOYALTY_STREAM_URL=$(oc get route web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)/dashboard/loyaltystream
            CONFIG_STREAM_URL=$(oc get route web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)/dashboard/stream
            CONFIG_REWARD_STREAM_URL=$(oc get route web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)/dashboard/rewards/stream
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"CORS_ORIGINS\":\"http://$CONFIG_CORS_ORIGINS\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"LOYALTY_STREAM_URL\":\"http://$CONFIG_LOYALTY_STREAM_URL\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"STREAM_URL\":\"http://$CONFIG_STREAM_URL\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"REWARD_STREAM_URL\":\"http://$CONFIG_REWARD_STREAM_URL\"}}"

            KAFKA_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}')
            oc set env deployment/web KAFKA_BOOTSTRAP_URLS=$KAFKA_URL -n quarkusdroneshop-demo

            STREAM_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.STREAM_URL}')
            oc set env deployment/web STREAM_URL=$STREAM_URL -n quarkusdroneshop-demo
            LOYALTY_STREAM_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.LOYALTY_STREAM_URL}')
            oc set env deployment/web LOYALTY_STREAM_URL=$LOYALTY_STREAM_URL -n quarkusdroneshop-demo
            CORS_ORIGINS=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.CORS_ORIGINS}')
            oc set env deployment/web CORS_ORIGINS=$CORS_ORIGINS -n quarkusdroneshop-demo
            STORE_ID=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.STORE_ID}')
            oc set env deployment/web STORE_ID=$STORE_ID -n quarkusdroneshop-demo
            REWARD_STREAM_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.REWARD_STREAM_URL}')
            oc set env deployment/web REWARD_STREAM_URL=$REWARD_STREAM_URL -n quarkusdroneshop-demo
      workspaces:
        - name: source
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: build-and-push-quarkusdroneshop-web
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-web
    app.kubernetes.io/instance: quarkusdroneshop-web
    app.kubernetes.io/part-of: quarkusdroneshop
    backstage.io/kubernetes-id: quarkusdroneshop-web
spec:
  pipelineRef:
    name: build-and-push-quarkusdroneshop-web
  params:
    - name: IMAGE_TAG
      value: latest
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: quarkusdroneshop-web-shared-workspace-pvc

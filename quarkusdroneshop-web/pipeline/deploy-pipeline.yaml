apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-quarkusdroneshop-web
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-web
spec:
  params:
    - default: latest
      description: Image Tag Value
      name: IMAGE_TAG
      type: string
  results:
    - name: junit
      description: JUnit test result summary
      value: $(tasks.pipeline-summary.results.junit)
    - name: semgrep
      description: Semgrep SAST result summary
      value: $(tasks.pipeline-summary.results.semgrep)
    - name: owasp
      description: OWASP Dependency-Check result summary
      value: $(tasks.pipeline-summary.results.owasp)
    - name: report-url
      description: Test report URL
      value: $(tasks.pipeline-summary.results.report-url)
  workspaces:
    - name: shared-workspace
    - name: dependency-check-cache
      description: "NVD DB (dependency-check-db PVC, CronJob で毎日更新)"
  tasks:

    - name: owasp-dependency-check-update
      taskRef:
        name: owasp-dependency-check-update
      workspaces:
        - name: cache
          workspace: dependency-check-cache

    - name: fetch-repository
      params:
        - name: url
          value: 'https://github.com/quarkusdroneshop/quarkusdroneshop-web'
        - name: subdirectory
          value: ''
        - name: deleteExisting
          value: 'true'
      taskRef:
        kind: Task
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: semgrep-scan
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: semgrep-scan
      params:
        - name: RULES
          value: "p/java,p/owasp-top-ten,p/secrets"
        - name: FAIL_ON_FINDINGS
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: maven-run
      runAfter:
        - semgrep-scan
      taskRef:
        kind: Task
        name: maven-no-settings21
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "clean verify"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: owasp-dependency-check
      runAfter:
        - maven-run
        - owasp-dependency-check-update
      taskRef:
        kind: Task
        name: owasp-dependency-check
      params:
        - name: FAIL_ON_CVSS
          value: "8"
        - name: NVD_API_DELAY
          value: "16000"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: cache
          workspace: dependency-check-cache

    - name: print-csv-table
      runAfter:
        - owasp-dependency-check
      taskRef:
        kind: Task
        name: print-csv-table
      params:
        - name: TITLE
          value: "web テスト結果サマリー"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: publish-test-report
      runAfter:
        - print-csv-table
      taskRef:
        kind: Task
        name: publish-test-report
      params:
        - name: APP_NAME
          value: web
        - name: CONTEXT_DIR
          value: .
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: pipeline-summary
      runAfter:
        - publish-test-report
      taskRef:
        kind: Task
        name: pipeline-summary
      params:
        - name: APP_NAME
          value: web
        - name: TEST_TOTAL
          value: $(tasks.print-csv-table.results.total-tests)
        - name: TEST_PASSED
          value: $(tasks.print-csv-table.results.passed)
        - name: TEST_FAILURES
          value: $(tasks.print-csv-table.results.failures)
        - name: TEST_ERRORS
          value: $(tasks.print-csv-table.results.errors)
        - name: SEMGREP_HIGH
          value: $(tasks.semgrep-scan.results.high)
        - name: SEMGREP_MEDIUM
          value: $(tasks.semgrep-scan.results.medium)
        - name: SEMGREP_LOW
          value: $(tasks.semgrep-scan.results.low)
        - name: SEMGREP_TOTAL
          value: $(tasks.semgrep-scan.results.total)
        - name: OWASP_CRITICAL
          value: $(tasks.owasp-dependency-check.results.critical)
        - name: OWASP_HIGH
          value: $(tasks.owasp-dependency-check.results.high)
        - name: OWASP_MEDIUM
          value: $(tasks.owasp-dependency-check.results.medium)
        - name: OWASP_LOW
          value: $(tasks.owasp-dependency-check.results.low)
        - name: OWASP_TOTAL
          value: $(tasks.owasp-dependency-check.results.total)
        - name: REPORT_URL
          value: $(tasks.publish-test-report.results.report-url)

    - name: push-oc-apps
      runAfter:
        - owasp-dependency-check
      taskRef:
        name: push-app-task
      params:
        - name: SCRIPT
          value: |
            #!/bin/bash
            set -e

            oc delete all -l app=web -n quarkusdroneshop-demo || true
            oc delete bc/web -n quarkusdroneshop-demo || true
            oc new-build --binary --name=web --image-stream=ubi8-openjdk-21:1.18 -n quarkusdroneshop-demo
            oc start-build web --from-dir=target/quarkus-app/ --follow -n quarkusdroneshop-demo
            oc new-app web --name=web --allow-missing-images -n quarkusdroneshop-demo
            oc set env deployment/web JAVA_OPTS_APPEND="-Dquarkus.profile=prod" -n quarkusdroneshop-demo
            oc expose deployment web --port=8080 --name=quarkusdroneshop-web -n quarkusdroneshop-demo
            oc expose svc quarkusdroneshop-web --name=quarkusdroneshop-web -n quarkusdroneshop-demo

            CONFIG_CORS_ORIGINS=$(oc get route quarkusdroneshop-web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)
            CONFIG_LOYALTY_STREAM_URL=$(oc get route quarkusdroneshop-web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)/dashboard/loyaltystream
            CONFIG_STREAM_URL=$(oc get route quarkusdroneshop-web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)/dashboard/stream
            CONFIG_REWARD_STREAM_URL=$(oc get route quarkusdroneshop-web -o jsonpath='{.spec.host}' -n quarkusdroneshop-demo)/dashboard/rewards/stream
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"CORS_ORIGINS\":\"http://$CONFIG_CORS_ORIGINS\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"LOYALTY_STREAM_URL\":\"http://$CONFIG_LOYALTY_STREAM_URL\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"STREAM_URL\":\"http://$CONFIG_STREAM_URL\"}}"
            oc patch configmap droneshop-config -n quarkusdroneshop-demo -p "{\"data\":{\"REWARD_STREAM_URL\":\"http://$CONFIG_REWARD_STREAM_URL\"}}"

            KAFKA_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}')
            oc set env deployment/web KAFKA_BOOTSTRAP_URLS=$KAFKA_URL -n quarkusdroneshop-demo

            STREAM_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.STREAM_URL}')
            oc set env deployment/web STREAM_URL=$STREAM_URL -n quarkusdroneshop-demo
            LOYALTY_STREAM_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.LOYALTY_STREAM_URL}')
            oc set env deployment/web LOYALTY_STREAM_URL=$LOYALTY_STREAM_URL -n quarkusdroneshop-demo
            CORS_ORIGINS=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.CORS_ORIGINS}')
            oc set env deployment/web CORS_ORIGINS=$CORS_ORIGINS -n quarkusdroneshop-demo
            STORE_ID=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.STORE_ID}')
            oc set env deployment/web STORE_ID=$STORE_ID -n quarkusdroneshop-demo
            REWARD_STREAM_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.REWARD_STREAM_URL}')
            oc set env deployment/web REWARD_STREAM_URL=$REWARD_STREAM_URL -n quarkusdroneshop-demo
      workspaces:
        - name: source
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: build-and-push-quarkusdroneshop-web
  namespace: quarkusdroneshop-cicd
spec:
  pipelineRef:
    name: build-and-push-quarkusdroneshop-web
  params:
    - name: IMAGE_TAG
      value: latest
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: quarkusdroneshop-web-shared-workspace-pvc
    - name: dependency-check-cache
      persistentVolumeClaim:
        claimName: dependency-check-db

apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-quarkusdroneshop-homeoffice-ui
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-homeoffice-ui
spec:
  params:
    - default: latest
      description: Image Tag Value
      name: IMAGE_TAG
      type: string
  results:
    - name: junit
      description: JUnit test result summary
      value: $(tasks.pipeline-summary.results.junit)
    - name: semgrep
      description: Semgrep SAST result summary
      value: $(tasks.pipeline-summary.results.semgrep)
    - name: owasp
      description: OWASP Dependency-Check result summary
      value: $(tasks.pipeline-summary.results.owasp)
    - name: report-url
      description: Test report URL
      value: $(tasks.pipeline-summary.results.report-url)
  workspaces:
    - name: shared-workspace
    - name: dependency-check-cache
      description: "NVD DB (dependency-check-db PVC, CronJob で毎日更新)"
  tasks:

    - name: owasp-dependency-check-update
      onError: continue
      taskRef:
        name: owasp-dependency-check-update
      workspaces:
        - name: cache
          workspace: dependency-check-cache

    - name: fetch-repository
      params:
        - name: url
          value: 'https://github.com/quarkusdroneshop/quarkusdroneshop-homeoffice-ui'
        - name: subdirectory
          value: ''
        - name: deleteExisting
          value: 'true'
      taskRef:
        kind: Task
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: semgrep-scan
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: semgrep-scan
      params:
        - name: RULES
          value: "p/java,p/owasp-top-ten,p/secrets"
        - name: FAIL_ON_FINDINGS
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: owasp-dependency-check
      runAfter:
        - semgrep-scan
        - owasp-dependency-check-update
      taskRef:
        kind: Task
        name: owasp-dependency-check
      params:
        - name: FAIL_ON_CVSS
          value: "8"
        - name: NVD_API_DELAY
          value: "16000"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: cache
          workspace: dependency-check-cache

    - name: print-csv-table
      runAfter:
        - owasp-dependency-check
      taskRef:
        kind: Task
        name: print-csv-table
      params:
        - name: TITLE
          value: "homeoffice-ui テスト結果サマリー"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: publish-test-report
      runAfter:
        - print-csv-table
      taskRef:
        kind: Task
        name: publish-test-report
      params:
        - name: APP_NAME
          value: homeoffice-ui
        - name: CONTEXT_DIR
          value: .
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: pipeline-summary
      runAfter:
        - publish-test-report
      taskRef:
        kind: Task
        name: pipeline-summary
      params:
        - name: APP_NAME
          value: homeoffice-ui
        - name: TEST_TOTAL
          value: $(tasks.print-csv-table.results.total-tests)
        - name: TEST_PASSED
          value: $(tasks.print-csv-table.results.passed)
        - name: TEST_FAILURES
          value: $(tasks.print-csv-table.results.failures)
        - name: TEST_ERRORS
          value: $(tasks.print-csv-table.results.errors)
        - name: SEMGREP_HIGH
          value: $(tasks.semgrep-scan.results.high)
        - name: SEMGREP_MEDIUM
          value: $(tasks.semgrep-scan.results.medium)
        - name: SEMGREP_LOW
          value: $(tasks.semgrep-scan.results.low)
        - name: SEMGREP_TOTAL
          value: $(tasks.semgrep-scan.results.total)
        - name: OWASP_CRITICAL
          value: $(tasks.owasp-dependency-check.results.critical)
        - name: OWASP_HIGH
          value: $(tasks.owasp-dependency-check.results.high)
        - name: OWASP_MEDIUM
          value: $(tasks.owasp-dependency-check.results.medium)
        - name: OWASP_LOW
          value: $(tasks.owasp-dependency-check.results.low)
        - name: OWASP_TOTAL
          value: $(tasks.owasp-dependency-check.results.total)
        - name: REPORT_URL
          value: $(tasks.publish-test-report.results.report-url)

    - name: push-oc-apps
      runAfter:
        - print-csv-table
      taskRef:
        name: push-app-task
      params:
        - name: SCRIPT
          value: |
            #!/bin/bash
            set -e

            oc delete route homeoffice-ui -n quarkusdroneshop-demo || true
            oc delete svc homeoffice-ui -n quarkusdroneshop-demo || true
            oc delete deployment homeoffice-ui -n quarkusdroneshop-demo || true
            oc delete is homeoffice-ui -n quarkusdroneshop-demo || true
            oc delete bc/homeoffice-ui -n quarkusdroneshop-demo || true
            oc delete istag homeoffice-ui:latest -n quarkusdroneshop-demo || true

            echo "legacy-peer-deps=true" > .npmrc

            CONFIG_CORS_ORIGINS=$(oc get route homeoffice-backend \
              -o jsonpath='{.spec.host}' \
              -n quarkusdroneshop-demo)

            CONFIG_GRAPHQL_URL="https://${CONFIG_CORS_ORIGINS}/graphql"

            cat > .env <<EOF
            REACT_APP_GRAPHQL_ENDPOINT=${CONFIG_GRAPHQL_URL}
            ALLOWED_ORIGINS=https://${CONFIG_CORS_ORIGINS}
            EOF

            echo "===== .env ====="
            cat .env

            oc patch configmap droneshop-config \
              -n quarkusdroneshop-demo \
              -p "{\"data\":{\"CORS_ORIGINS\":\"https://${CONFIG_CORS_ORIGINS}\"}}"

            oc patch configmap droneshop-config \
              -n quarkusdroneshop-demo \
              -p "{\"data\":{\"GRAPHQL_URL\":\"${CONFIG_GRAPHQL_URL}\"}}"

            ./set-endpoint.sh

            oc new-build \
              --binary \
              --name=homeoffice-ui \
              --image-stream=openshift/nodejs:20-ubi8 \
              -n quarkusdroneshop-demo

            oc start-build \
              homeoffice-ui \
              --from-dir=. \
              --follow \
              -n quarkusdroneshop-demo

            oc new-app \
              homeoffice-ui \
              --name=homeoffice-ui \
              --allow-missing-images \
              -n quarkusdroneshop-demo

            oc expose svc homeoffice-ui \
              --name=homeoffice-ui \
              -n quarkusdroneshop-demo || true

            oc annotate deployment \
              -l app=homeoffice-ui \
              app.openshift.io/connects-to='["homeoffice-backend"]' \
              -n quarkusdroneshop-demo

            oc annotate deployment \
              -l app=homeoffice-backend \
              app.openshift.io/connects-to='["postgres"]' \
              -n quarkusdroneshop-demo

            oc label dc \
              -l app=postgres \
              app.kubernetes.io/name=postgresql \
              -n quarkusdroneshop-demo

            oc label deployment \
              -l app=homeoffice-backend \
              app.kubernetes.io/name=quarkus \
              -n quarkusdroneshop-demo

            oc label deployment \
              -l app=homeoffice-ui \
              app.kubernetes.io/name=nodejs \
              -n quarkusdroneshop-demo

            oc patch deployment homeoffice-ui \
              -n quarkusdroneshop-demo \
              --type=json \
              -p='[
                {
                  "op": "add",
                  "path": "/spec/template/spec/containers/0/securityContext",
                  "value": {
                    "allowPrivilegeEscalation": false,
                    "capabilities": {
                      "drop": ["ALL"]
                    },
                    "runAsNonRoot": true
                  }
                },
                {
                  "op": "add",
                  "path": "/spec/template/spec/securityContext",
                  "value": {
                    "seccompProfile": {
                      "type": "RuntimeDefault"
                    }
                  }
                }
              ]'

            npm test
            npm run test:e2e
      workspaces:
        - name: source
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: build-and-push-quarkusdroneshop-homeoffice-ui
  namespace: quarkusdroneshop-cicd
spec:
  pipelineRef:
    name: build-and-push-quarkusdroneshop-homeoffice-ui
  params:
    - name: IMAGE_TAG
      value: latest
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: homeoffice-pipeline-cache
    - name: dependency-check-cache
      persistentVolumeClaim:
        claimName: dependency-check-db

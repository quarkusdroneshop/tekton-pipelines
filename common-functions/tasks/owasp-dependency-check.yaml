apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: owasp-dependency-check
  namespace: quarkusdroneshop-cicd
spec:
  description: >
    OWASP Dependency-Check による SCA（ソフトウェア構成分析）。
    Maven の依存ライブラリに既知の CVE 脆弱性が含まれていないか検査する。
    FAIL_ON_CVSS を超えるスコアの CVE が検出された場合にパイプラインを停止できる。
    NVD データベースは dependency-check-db PVC（CronJob で毎日更新）を参照する。

  params:
    - name: CONTEXT_DIR
      description: Maven プロジェクトのディレクトリ（workspace 内の相対パス）
      type: string
      default: "."

    - name: FAIL_ON_CVSS
      description: この CVSS スコア以上で失敗させる（0-10、11=無効）
      type: string
      default: "7"

    - name: SUPPRESSION_FILE
      description: 抑制ファイルのパス（workspace 内の相対パス、省略可）
      type: string
      default: ""

  results:
    - name: critical
      description: CRITICAL CVE count (CVSS >= 9.0)
    - name: high
      description: HIGH CVE count (CVSS 7.0-8.9)
    - name: medium
      description: MEDIUM CVE count (CVSS 4.0-6.9)
    - name: low
      description: LOW CVE count (CVSS < 4.0)
    - name: total
      description: Total CVE count

  workspaces:
    - name: source
      description: Maven プロジェクトが格納されているワークスペース
    - name: cache
      description: NVD データベース（dependency-check-db PVC をマウント）
      optional: false

  steps:
    - name: scan
      image: owasp/dependency-check:latest
      workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)

      env:
        - name: FAIL_ON_CVSS
          value: $(params.FAIL_ON_CVSS)
        - name: SUPPRESSION_FILE
          value: $(params.SUPPRESSION_FILE)
        - name: NVD_API_KEY
          valueFrom:
            secretKeyRef:
              name: nvd-api-key
              key: key
              optional: true

      script: |
        #!/bin/sh
        set -e

        echo "=============================================="
        echo " OWASP Dependency-Check スキャン開始"
        echo " CVSS 閾値: ${FAIL_ON_CVSS}"
        echo "=============================================="

        REPORT_DIR="$(workspaces.source.path)/target/dependency-check-reports"
        mkdir -p "${REPORT_DIR}"

        CACHE_DIR="$(workspaces.cache.path)/nvd-data"

        echo "=== CACHE_DIR: ${CACHE_DIR} ==="
        find "${CACHE_DIR}" -type f -ls 2>/dev/null || true
        du -sh "${CACHE_DIR}" 2>/dev/null || true

        # OPTS 構築
        OPTS="
          --scan $(workspaces.source.path)/$(params.CONTEXT_DIR)
          --format HTML
          --format JSON
          --out ${REPORT_DIR}
          --data ${CACHE_DIR}
          --enableRetired
          --prettyPrint
          --noupdate
          --failOnCVSS ${FAIL_ON_CVSS}
        "

        if [ -n "${SUPPRESSION_FILE}" ]; then
          OPTS="${OPTS} --suppression $(workspaces.source.path)/${SUPPRESSION_FILE}"
        fi

        # スキャン実行（failOnCVSS に引っかかると非ゼロ終了）
        SCAN_EXIT=0
        /usr/share/dependency-check/bin/dependency-check.sh $OPTS || SCAN_EXIT=$?

        # JSON レポート解析
        REPORT_JSON="${REPORT_DIR}/dependency-check-report.json"

        if [ ! -f "${REPORT_JSON}" ]; then
          echo "[WARN] JSON レポートが生成されませんでした。"
          printf "検証不可" > "$(results.critical.path)"
          printf "検証不可" > "$(results.high.path)"
          printf "検証不可" > "$(results.medium.path)"
          printf "検証不可" > "$(results.low.path)"
          printf "検証不可" > "$(results.total.path)"
          exit 0
        fi

        # severity カウント（grep + wc でシェル完結）
        CRITICAL=$(grep -o '"severity":"CRITICAL"' "${REPORT_JSON}" | wc -l | tr -d ' ')
        HIGH=$(grep -o '"severity":"HIGH"'     "${REPORT_JSON}" | wc -l | tr -d ' ')
        MEDIUM=$(grep -o '"severity":"MEDIUM"'  "${REPORT_JSON}" | wc -l | tr -d ' ')
        LOW=$(grep -o '"severity":"LOW"'      "${REPORT_JSON}" | wc -l | tr -d ' ')
        TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW))

        printf "%s" "${CRITICAL}" > "$(results.critical.path)"
        printf "%s" "${HIGH}"     > "$(results.high.path)"
        printf "%s" "${MEDIUM}"   > "$(results.medium.path)"
        printf "%s" "${LOW}"      > "$(results.low.path)"
        printf "%s" "${TOTAL}"    > "$(results.total.path)"

        echo "CRITICAL=${CRITICAL} HIGH=${HIGH} MEDIUM=${MEDIUM} LOW=${LOW} TOTAL=${TOTAL}"

        # dependency-check 自体の終了コードをそのまま伝播
        exit ${SCAN_EXIT}

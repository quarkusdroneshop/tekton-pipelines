apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: owasp-dependency-check-update
  namespace: quarkusdroneshop-cicd
spec:
  workspaces:
    - name: cache

  steps:
    - name: check-api-key
      image: registry.access.redhat.com/ubi8/ubi-minimal:latest
      env:
        - name: NVD_API_KEY
          valueFrom:
            secretKeyRef:
              name: nvd-api-key
              key: key
              optional: true
      script: |
        #!/bin/sh
        FLAG_FILE="$(workspaces.cache.path)/.nvd-skip-flag"
        if [ -z "${NVD_API_KEY}" ]; then
          echo "NVD_API_KEY が設定されていません (nvd-api-key Secret なし) - スキップします"
          echo "skip" > "${FLAG_FILE}"
        else
          echo "NVD_API_KEY を確認しました - DB 更新を実行します"
          echo "run" > "${FLAG_FILE}"
          printf '%s' "${NVD_API_KEY}" > "$(workspaces.cache.path)/.nvd-api-key"
        fi

    - name: update-db
      image: owasp/dependency-check:latest
      script: |
        #!/bin/sh
        set -e

        FLAG_FILE="$(workspaces.cache.path)/.nvd-skip-flag"
        if [ -f "${FLAG_FILE}" ] && [ "$(cat "${FLAG_FILE}")" = "skip" ]; then
          echo "スキップフラグを検出 - DB 更新をスキップします"
          exit 0
        fi

        NVD_API_KEY="$(cat "$(workspaces.cache.path)/.nvd-api-key" 2>/dev/null || true)"
        if [ -z "${NVD_API_KEY}" ]; then
          echo "API キーが取得できません - スキップします"
          exit 0
        fi

        CACHE_DIR="$(workspaces.cache.path)/nvd-data"

        echo "=== CACHE_DIR ==="
        echo "${CACHE_DIR}"

        echo "=== FILES ==="
        find "${CACHE_DIR}" -type f -ls 2>/dev/null || true

        echo "=== SIZE ==="
        du -sh "${CACHE_DIR}" 2>/dev/null || true

        if [ -s "${CACHE_DIR}/odc.mv.db" ]; then
          echo "Found existing DB"
          if find "${CACHE_DIR}" -name "*.mv.db" -mtime -7 | grep -q .; then
            echo "DB is fresh (within 7 days) - スキップ"
            exit 0
          fi
        fi

        /usr/share/dependency-check/bin/dependency-check.sh \
          --updateonly \
          --data "${CACHE_DIR}" \
          --nvdApiKey "${NVD_API_KEY}"

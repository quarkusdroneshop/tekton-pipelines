apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: print-csv-table
  namespace: quarkusdroneshop-cicd
spec:
  description: >
    Maven Surefire XML レポートを解析してテスト結果を表形式でログに出力する共通タスク。
    CSV_FILE を指定した場合はそのファイルを表示し、省略時は target/surefire-reports/ を自動解析する。
  params:
    - name: CSV_FILE
      description: Workspace 内の CSV ファイルパス（省略時は surefire XML を自動解析）
      type: string
      default: ""
    - name: CONTEXT_DIR
      description: Maven プロジェクトのディレクトリ（shared-workspace 内の相対パス）
      type: string
      default: "."
    - name: TITLE
      description: テーブルのタイトル
      type: string
      default: "テスト結果サマリー"
  workspaces:
    - name: source
      description: Maven プロジェクトが格納されているワークスペース
  results:
    - name: total-tests
      description: Total test count
    - name: passed
      description: Passed test count
    - name: failures
      description: Failed test count
    - name: errors
      description: Error test count
  steps:
    - name: print-table
      image: python:3.12-slim
      script: |
        #!/usr/bin/env python3
        import csv
        import os
        import sys
        import glob
        import xml.etree.ElementTree as ET

        base_dir = os.path.join("$(workspaces.source.path)", "$(params.CONTEXT_DIR)")
        csv_file = "$(params.CSV_FILE)"
        title    = "$(params.TITLE)"

        def print_sep(widths):
            print("+" + "+".join("-" * (w + 2) for w in widths) + "+")

        def print_row(row, widths):
            print("|" + "|".join(f" {str(v):<{widths[i]}} " for i, v in enumerate(row)) + "|")

        def render_table(rows, title=""):
            if not rows:
                print("[print-csv-table] 表示するデータがありません。")
                return
            col_count = max(len(r) for r in rows)
            rows = [list(r) + [""] * (col_count - len(r)) for r in rows]
            widths = [max(len(str(r[i])) for r in rows) for i in range(col_count)]
            if title:
                total = sum(w + 3 for w in widths) + 1
                print("=" * total)
                print(f" {title}")
            print_sep(widths)
            print_row(rows[0], widths)
            print_sep(widths)
            for row in rows[1:]:
                print_row(row, widths)
            print_sep(widths)

        total_tests = total_passed = total_failures = total_errors = 0

        def write_results(total, passed, failures, errors):
            with open("$(results.total-tests.path)", "w") as f: f.write(str(total))
            with open("$(results.passed.path)",      "w") as f: f.write(str(passed))
            with open("$(results.failures.path)",    "w") as f: f.write(str(failures))
            with open("$(results.errors.path)",      "w") as f: f.write(str(errors))

        try:
            # --- CSV モード ---
            if csv_file:
                csv_path = os.path.join(base_dir, csv_file)
                if not os.path.exists(csv_path):
                    print(f"[print-csv-table] CSV ファイルが見つかりません: {csv_path}")
                    sys.exit(0)
                with open(csv_path, newline="", encoding="utf-8") as f:
                    rows = list(csv.reader(f))
                render_table(rows, title)
                sys.exit(0)

            # --- Surefire XML モード ---
            xml_dir = os.path.join(base_dir, "target", "surefire-reports")
            xml_files = glob.glob(os.path.join(xml_dir, "TEST-*.xml"))

            if not xml_files:
                print(f"[print-csv-table] surefire レポートが見つかりません: {xml_dir}")
                print("[print-csv-table] Maven の GOALS に 'verify' または 'test' を含めてください。")
                sys.exit(0)

            header = ["テストスイート", "テスト数", "成功", "失敗", "エラー", "スキップ", "時間(秒)"]
            rows = [header]
            total_skipped = 0
            total_time = 0.0

            for xml_file in sorted(xml_files):
                try:
                    tree = ET.parse(xml_file)
                    root = tree.getroot()
                    name     = root.get("name", os.path.basename(xml_file))
                    tests    = int(root.get("tests",    0))
                    failures = int(root.get("failures", 0))
                    errors   = int(root.get("errors",   0))
                    skipped  = int(root.get("skipped",  0))
                    time_val = float(root.get("time",   0.0))
                    passed   = tests - failures - errors - skipped

                    parts = name.split(".")
                    short_name = ".".join(parts[-2:]) if len(parts) >= 2 else name

                    rows.append([short_name, tests, passed, failures, errors, skipped, f"{time_val:.2f}"])
                    total_tests    += tests
                    total_passed   += passed
                    total_failures += failures
                    total_errors   += errors
                    total_skipped  += skipped
                    total_time     += time_val
                except Exception as e:
                    print(f"[print-csv-table] 警告: {xml_file} の解析に失敗しました: {e}")

            rows.append(["合計", total_tests, total_passed, total_failures, total_errors, total_skipped, f"{total_time:.2f}"])
            render_table(rows, title)

            if total_failures > 0 or total_errors > 0:
                print(f"\n[print-csv-table] 失敗: {total_failures} / エラー: {total_errors}")

        except Exception as e:
            print(f"[print-csv-table] 予期しないエラー: {e}")
        finally:
            write_results(total_tests, total_passed, total_failures, total_errors)

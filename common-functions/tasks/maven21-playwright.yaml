apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-playwright
  namespace: quarkusdroneshop-cicd
spec:
  description: >
    Playwright ブラウザ依存ライブラリ込みの Maven タスク。
    maven-failsafe-plugin で Playwright E2E テストを実行するために使用する。
    mcr.microsoft.com/playwright/java イメージにはブラウザ(Chromium/Firefox/WebKit)と
    必要な OS ライブラリ(libatk/libdrm/libxkbcommon 等)が含まれている。
  params:
    - name: GOALS
      description: Maven goals to run
      type: string
    - name: CONTEXT_DIR
      description: Directory containing the Maven project
      type: string
      default: "."
  workspaces:
    - name: source
      description: The workspace containing the Maven project.
  steps:
    - name: mvn
      image: mcr.microsoft.com/playwright/java:v1.50.0-noble
      workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
      script: |
        #!/bin/bash
        echo "Running mvn $(params.GOALS)"
        mvn $(params.GOALS)

apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-scan
  namespace: quarkusdroneshop-cicd
spec:
  description: >
    Trivy による SCA（ソフトウェア構成解析）。
    pom.xml / package.json の依存ライブラリの CVE・ライセンス・設定ミスを検出する。
  params:
    - name: SCANNERS
      description: 有効化するスキャナ（カンマ区切り: vuln,secret,misconfig,license）
      type: string
      default: "vuln,secret"
    - name: EXIT_CODE
      description: "CRITICAL/HIGH 検出時の終了コード (0=継続 / 1=失敗)"
      type: string
      default: "0"
    - name: IGNOREFILE
      description: 無視リストファイルパス（存在しなければ無視）
      type: string
      default: ".trivyignore.yaml"
    - name: OUTPUT_FILE
      description: レポート出力パス（workspace 内相対パス）
      type: string
      default: "target/trivy.txt"
    - name: SEVERITY
      description: 報告する重大度（カンマ区切り）
      type: string
      default: "CRITICAL,HIGH,MEDIUM"
  workspaces:
    - name: source
      description: スキャン対象のソースコード
  steps:
    - name: scan
      image: aquasec/trivy:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e

        echo "=============================================="
        echo " Trivy SCA スキャン開始"
        echo " スキャナ: $(params.SCANNERS)"
        echo "=============================================="

        OUTPUT_FILE="$(workspaces.source.path)/$(params.OUTPUT_FILE)"
        mkdir -p "$(dirname "${OUTPUT_FILE}")"
        chmod -R 777 "$(dirname "${OUTPUT_FILE}")"

        IGNORE_OPTS=""
        if [ -f "$(workspaces.source.path)/$(params.IGNOREFILE)" ]; then
          IGNORE_OPTS="--ignorefile $(workspaces.source.path)/$(params.IGNOREFILE)"
        fi

        trivy fs \
          --scanners "$(params.SCANNERS)" \
          --severity "$(params.SEVERITY)" \
          --exit-code "$(params.EXIT_CODE)" \
          --format table \
          --output "${OUTPUT_FILE}" \
          ${IGNORE_OPTS} \
          "$(workspaces.source.path)" \
          || SCAN_EXIT=$?

        echo "=============================================="
        echo " スキャン完了: $(params.OUTPUT_FILE)"
        if [ -f "${OUTPUT_FILE}" ]; then
          echo "--- 結果サマリー ---"
          grep -E "^Total:|CRITICAL|HIGH" "${OUTPUT_FILE}" | head -20 || true
        fi
        echo "=============================================="

apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-quarkusdroneshop-reward
  namespace: quarkusdroneshop-cicd
  labels:
    app: quarkusdroneshop-reward
spec:
  params:
    - default: latest
      description: Image Tag Value
      name: IMAGE_TAG
      type: string
  results:
    - name: junit
      description: JUnit test result summary
      value: $(tasks.pipeline-summary.results.junit)
    - name: semgrep
      description: Semgrep SAST result summary
      value: $(tasks.pipeline-summary.results.semgrep)
    - name: owasp
      description: OWASP Dependency-Check result summary
      value: $(tasks.pipeline-summary.results.owasp)
    - name: report-url
      description: Test report URL
      value: $(tasks.pipeline-summary.results.report-url)
  workspaces:
    - name: shared-workspace
    - name: dependency-check-cache
      description: "NVD DB (dependency-check-db PVC, CronJob で毎日更新)"
  tasks:

    - name: owasp-dependency-check-update
      taskRef:
        name: owasp-dependency-check-update
      workspaces:
        - name: cache
          workspace: dependency-check-cache

    - name: fetch-repository
      params:
        - name: url
          value: 'https://github.com/quarkusdroneshop/quarkusdroneshop-reward'
        - name: subdirectory
          value: ''
        - name: deleteExisting
          value: 'true'
      taskRef:
        kind: Task
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: semgrep-scan
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: semgrep-scan
      params:
        - name: RULES
          value: "p/java,p/owasp-top-ten,p/secrets"
        - name: FAIL_ON_FINDINGS
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: maven-run
      runAfter:
        - semgrep-scan
      taskRef:
        kind: Task
        name: maven-no-settings11
      params:
        - name: CONTEXT_DIR
          value: .
        - name: GOALS
          value: "clean verify"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: owasp-dependency-check
      runAfter:
        - maven-run
        - owasp-dependency-check-update
      taskRef:
        kind: Task
        name: owasp-dependency-check
      params:
        - name: FAIL_ON_CVSS
          value: "8"
        - name: NVD_API_DELAY
          value: "16000"
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: cache
          workspace: dependency-check-cache

    - name: print-csv-table
      runAfter:
        - owasp-dependency-check
      taskRef:
        kind: Task
        name: print-csv-table
      params:
        - name: TITLE
          value: "reward テスト結果サマリー"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: publish-test-report
      runAfter:
        - print-csv-table
      taskRef:
        kind: Task
        name: publish-test-report
      params:
        - name: APP_NAME
          value: reward
        - name: CONTEXT_DIR
          value: .
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: pipeline-summary
      runAfter:
        - publish-test-report
      taskRef:
        kind: Task
        name: pipeline-summary
      params:
        - name: APP_NAME
          value: reward
        - name: TEST_TOTAL
          value: $(tasks.print-csv-table.results.total-tests)
        - name: TEST_PASSED
          value: $(tasks.print-csv-table.results.passed)
        - name: TEST_FAILURES
          value: $(tasks.print-csv-table.results.failures)
        - name: TEST_ERRORS
          value: $(tasks.print-csv-table.results.errors)
        - name: SEMGREP_HIGH
          value: $(tasks.semgrep-scan.results.high)
        - name: SEMGREP_MEDIUM
          value: $(tasks.semgrep-scan.results.medium)
        - name: SEMGREP_LOW
          value: $(tasks.semgrep-scan.results.low)
        - name: SEMGREP_TOTAL
          value: $(tasks.semgrep-scan.results.total)
        - name: OWASP_CRITICAL
          value: $(tasks.owasp-dependency-check.results.critical)
        - name: OWASP_HIGH
          value: $(tasks.owasp-dependency-check.results.high)
        - name: OWASP_MEDIUM
          value: $(tasks.owasp-dependency-check.results.medium)
        - name: OWASP_LOW
          value: $(tasks.owasp-dependency-check.results.low)
        - name: OWASP_TOTAL
          value: $(tasks.owasp-dependency-check.results.total)
        - name: REPORT_URL
          value: $(tasks.publish-test-report.results.report-url)

    - name: push-oc-apps
      runAfter:
        - maven-run
      taskRef:
        name: push-app-task
      params:
        - name: SCRIPT
          value: |
            #!/bin/bash
            set -e

            oc delete all -l app=reward -n quarkusdroneshop-demo || true
            oc delete bc/reward -n quarkusdroneshop-demo || true
            oc new-build --binary --name=reward --image-stream=java:openjdk-17-ubi8 -n quarkusdroneshop-demo
            oc start-build reward --from-dir=target/quarkus-app/ --follow -n quarkusdroneshop-demo
            oc new-app reward --name=reward --allow-missing-images -n quarkusdroneshop-demo
            oc set env deployment/reward JAVA_OPTS_APPEND="-Dquarkus.profile=prod" -n quarkusdroneshop-demo

            PGSQL_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.PGSQL_URL}')
            oc set env deployment/reward PGSQL_URL=$PGSQL_URL -n quarkusdroneshop-demo
            PGSQL_USER=$(oc get secret droneshopdb-pguser-droneshopadmin -n quarkusdroneshop-demo -o=jsonpath='{.data.user}' | base64 --decode)
            oc set env deployment/reward PGSQL_USER=$PGSQL_USER -n quarkusdroneshop-demo
            PGSQL_PASS=$(oc get secret droneshopdb-pguser-droneshopadmin -n quarkusdroneshop-demo -o=jsonpath='{.data.password}' | base64 --decode)
            oc set env deployment/reward PGSQL_PASS=$PGSQL_PASS -n quarkusdroneshop-demo

            KAFKA_URL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.KAFKA_BOOTSTRAP_URLS}')
            oc set env deployment/reward KAFKA_BOOTSTRAP_URLS=$KAFKA_URL -n quarkusdroneshop-demo
            QUARKUS_LOG_LEVEL=$(oc get configmap droneshop-config -n quarkusdroneshop-demo -o=jsonpath='{.data.QUARKUS_LOG_LEVEL}')
            oc set env deployment/reward QUARKUS_LOG_LEVEL=$QUARKUS_LOG_LEVEL -n quarkusdroneshop-demo
      workspaces:
        - name: source
          workspace: shared-workspace
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: build-and-push-quarkusdroneshop-reward
  namespace: quarkusdroneshop-cicd
spec:
  pipelineRef:
    name: build-and-push-quarkusdroneshop-reward
  params:
    - name: IMAGE_TAG
      value: latest
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: quarkusdroneshop-reword-shared-workspace-pvc
    - name: dependency-check-cache
      persistentVolumeClaim:
        claimName: dependency-check-db
